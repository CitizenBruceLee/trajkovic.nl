<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>trajkovic.nl</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background-image:
        linear-gradient(
          rgba(0, 0, 0, 0.42),
          rgba(0, 0, 0, 0.42)
        ),
        url("background.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    main {
      max-width: 1000px;
      text-align: center;
    }

    blockquote {
      margin: 0;
      font-size: clamp(34px, 6vw, 84px);
      line-height: 1.08;
      font-weight: 600;
      letter-spacing: -0.04em;
      text-shadow: 0 8px 36px rgba(0, 0, 0, 0.55);
    }
  </style>
</head>

<body>
  <main>
    <blockquote>
      Attention is a scarce resource.
    </blockquote>
  </main>
</body>
</html>
